name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle
      run: |
        curl -L https://services.gradle.org/distributions/gradle-7.5-bin.zip -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
        echo "/tmp/gradle-dist/gradle-7.5/bin" >> $GITHUB_PATH

    - name: Regenerate Wrapper JAR
      run: |
        gradle wrapper --gradle-version=7.5 --distribution-type=bin
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ExamAuto-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
